<!DOCTYPE html>
<html>
<head>
  <title>Registration Form</title>
</head>
<body>

<h2>Registration Form</h2>

<input type="text" id="name" placeholder="Name"><br><br>
<input type="text" id="designation" placeholder="Designation"><br><br>
<input type="email" id="email" placeholder="Email"><br><br>
<input type="text" id="mobile" placeholder="Mobile"><br><br>

<button onclick="saveUser()">Submit</button>

<hr>

<h3>Saved Data</h3>

<table border="1">
  <thead>
    <tr>
      <th>Name</th>
      <th>Designation</th>
      <th>Email</th>
      <th>Mobile</th>
      <th>Date & Time</th>
    </tr>
  </thead>
  <tbody id="tableBody"></tbody>
</table>

<!-- SUPABASE CDN -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseUrl = "https://pnmvkexztowmcakmgxtj.supabase.co";
const supabaseKey = "sb_publishable_5WKF82sJGvKiuT3SaKZCGw_JbXzhXo6";

const client = supabase.createClient(supabaseUrl, supabaseKey);

// 🔥 SAVE USER
async function saveUser() {

  const name = document.getElementById("name").value.trim();
  const designation = document.getElementById("designation").value.trim();
  const email = document.getElementById("email").value.trim();
  const mobile = document.getElementById("mobile").value.trim();

  if (!name || !designation || !email || !mobile) {
    alert("Please fill all fields");
    return;
  }

  if (!email.includes("@")) {
    alert("Invalid Email");
    return;
  }

  if (mobile.length !== 10) {
    alert("Mobile must be 10 digits");
    return;
  }

  const { error } = await client
    .from("users")
    .insert([{ name, designation, email, mobile }]);

  if (error) {
    alert("Error saving data");
  } else {
    alert("Saved successfully ✅");

    document.getElementById("name").value = "";
    document.getElementById("designation").value = "";
    document.getElementById("email").value = "";
    document.getElementById("mobile").value = "";

    loadUsers(); // 🔥 reload table
  }
}

// 🔥 LOAD USERS (MAIN IMPORTANT PART)
async function loadUsers() {

  const { data, error } = await client
    .from("users")
    .select("*")
    .order("created_at", { ascending: false });

  if (error) {
    console.log(error);
    return;
  }

  let html = "";

  data.forEach(item => {
    html += `
      <tr>
        <td>${item.name}</td>
        <td>${item.designation}</td>
        <td>${item.email}</td>
        <td>${item.mobile}</td>
        <td>${new Date(item.created_at).toLocaleString()}</td>
      </tr>
    `;
  });

  document.getElementById("tableBody").innerHTML = html;
}

// 🔥 PAGE LOAD पर data दिखाओ
loadUsers();

</script>

</body>
</html>
