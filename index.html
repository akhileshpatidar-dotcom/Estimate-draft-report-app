<!DOCTYPE html>
<html>
<head>
  <title>Registration Form</title>
</head>
<body>

<h2>Registration Form</h2>

<input type="text" id="name" placeholder="Name"><br><br>
<input type="text" id="designation" placeholder="Designation"><br><br>
<input type="email" id="email" placeholder="Email"><br><br>
<input type="text" id="mobile" placeholder="Mobile"><br><br>

<button onclick="saveUser()">Submit</button>

<!-- ✅ CORRECT CDN -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<script>
const supabaseUrl = "https://pnmvkexztowmcakmgxtj.supabase.co";
const supabaseKey = "sb_publishable_5WKF82sJGvKiuT3SaKZCGw_JbXzhXo6";

// ✅ CORRECT WAY
const client = supabase.createClient(supabaseUrl, supabaseKey);

async function saveUser() {
  console.log("Button clicked");

  const name = document.getElementById("name").value;
  const designation = document.getElementById("designation").value;
  const email = document.getElementById("email").value;
  const mobile = document.getElementById("mobile").value;

  const { error } = await client
    .from("users")
    .insert([{ name, designation, email, mobile }]);

  if (error) {
    alert("Error saving data");
    console.log(error);
  } else {
    alert("Saved successfully");
  }
}
</script>

</body>
</html>
