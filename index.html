<!-- 🔥 FIX: App open par form hide -->
<script>
window.onload = function() {
  document.getElementById('userRegistrationModal').style.display = 'none';
};
</script>

<!-- 🔥 FIXED DOWNLOAD FLOW -->
<script>
window.handleDraftShare = async () => {
  const savedUser = localStorage.getItem('estimate_app_user');

  // ❗ user saved nahi → form dikhao
  if (!savedUser) {
    document.getElementById('userRegistrationModal').style.display = 'flex';
    return;
  }

  const user = JSON.parse(savedUser);

  // ✅ download log save
  await client.from('download_logs').insert([
    {
      userName: user.name,
      userMobile: user.mobile,
      workName: document.getElementById('nameOfWork').value || "N/A"
    }
  ]);

  // ✅ PDF download
  window.generatePDF();
};
</script>

<!-- 🔥 FORM SAVE + DOWNLOAD -->
<script>
window.saveUserAndDownload = async () => {
  const n = document.getElementById('regName').value.trim();
  const d_ = document.getElementById('regDesignation').value.trim();
  const e = document.getElementById('regEmail').value.trim();
  const m = document.getElementById('regMobile').value.trim();

  if (!n || !d_ || !e || !m) {
    alert("Please fill all fields");
    return;
  }

  if (!e.includes("@")) {
    alert("Invalid Email");
    return;
  }

  if (m.length !== 10) {
    alert("Mobile must be 10 digits");
    return;
  }

  // ✅ Supabase save
  await client.from('users').insert([
    { name: n, designation: d_, email: e, mobile: m }
  ]);

  // ✅ local save
  localStorage.setItem('estimate_app_user', JSON.stringify({
    name: n,
    mobile: m
  }));

  // close form
  document.getElementById('userRegistrationModal').style.display = 'none';

  // ✅ log save
  await client.from('download_logs').insert([
    {
      userName: n,
      userMobile: m,
      workName: document.getElementById('nameOfWork').value || "N/A"
    }
  ]);

  // download
  window.generatePDF();
};
</script>
