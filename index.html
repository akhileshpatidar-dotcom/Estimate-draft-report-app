<!DOCTYPE html>
<html>
<head>
  <title>Estimate App (FINAL)</title>
</head>

<body>

<h2>Estimate App</h2>

<button onclick="handleDownload()">Download Report</button>

<br><br>

<!-- Registration Form -->
<div id="formBox" style="display:none;">
  <h3>Registration (First Time Only)</h3>

  <input type="text" id="name" placeholder="Name"><br><br>
  <input type="text" id="designation" placeholder="Designation"><br><br>
  <input type="email" id="email" placeholder="Email"><br><br>
  <input type="text" id="mobile" placeholder="Mobile"><br><br>

  <button onclick="saveUser()">Submit</button>
</div>

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseUrl = "https://pnmvkexztowmcakmgxtj.supabase.co";
const supabaseKey = "sb_publishable_5WKF82sJGvKiuT3SaKZCGw_JbXzhXo6";
const client = supabase.createClient(supabaseUrl, supabaseKey);

// PAGE LOAD
window.onload = function () {
  const savedUser = localStorage.getItem("estimate_app_user");

  if (!savedUser) {
    document.getElementById("formBox").style.display = "block";
  }
};

// SAVE USER (FIRST TIME)
async function saveUser() {

  const name = document.getElementById("name").value.trim();
  const designation = document.getElementById("designation").value.trim();
  const email = document.getElementById("email").value.trim();
  const mobile = document.getElementById("mobile").value.trim();

  if (!name || !designation || !email || !mobile) {
    alert("Please fill all fields");
    return;
  }

  if (!email.includes("@")) {
    alert("Invalid Email");
    return;
  }

  if (mobile.length !== 10) {
    alert("Mobile must be 10 digits");
    return;
  }

  // save user
  await client.from("users").insert([
    { name, designation, email, mobile }
  ]);

  // save locally
  localStorage.setItem("estimate_app_user", JSON.stringify({
    name, designation, email, mobile
  }));

  document.getElementById("formBox").style.display = "none";

  // first log
  await client.from("download_logs").insert([
    {
      userName: name,
      userMobile: mobile,
      workName: "N/A"
    }
  ]);

  alert("Registered + Downloaded ✅");
}

// DOWNLOAD
async function handleDownload() {

  const savedUser = JSON.parse(localStorage.getItem("estimate_app_user"));

  if (!savedUser) {
    document.getElementById("formBox").style.display = "block";
    return;
  }

  // हर बार log
  await client.from("download_logs").insert([
    {
      userName: savedUser.name,
      userMobile: savedUser.mobile,
      workName: "N/A"
    }
  ]);

  alert("Report Downloaded ✅");
}
</script>

</body>
</html>
