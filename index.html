<!DOCTYPE html>
<html>
<head>
  <title>Estimate App</title>

  <!-- ✅ Supabase CDN (FIXED) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body>

<h2>Estimate App Running ✅</h2>

<button onclick="handleDraftShare()">Download Report</button>

<!-- 🔥 Registration Form -->
<div id="userRegistrationModal" style="display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:#000000aa; justify-content:center; align-items:center;">
  <div style="background:white; padding:20px;">
    <h3>Enter Details</h3>

    <input id="regName" placeholder="Name"><br><br>
    <input id="regDesignation" placeholder="Designation"><br><br>
    <input id="regEmail" placeholder="Email"><br><br>
    <input id="regMobile" placeholder="Mobile"><br><br>

    <button onclick="saveUserAndDownload()">Submit & Download</button>
  </div>
</div>

<script>
const supabaseUrl = "https://pnmvkexztowmcakmgxtj.supabase.co";
const supabaseKey = "sb_publishable_5WKF82sJGvKiuT3SaKZCGw_JbXzhXo6";
const client = supabase.createClient(supabaseUrl, supabaseKey);

// 🔥 App open → form hidden
window.onload = function () {
  document.getElementById("userRegistrationModal").style.display = "none";
};

// 🔥 Download button
function handleDraftShare() {
  const savedUser = localStorage.getItem("estimate_app_user");

  if (!savedUser) {
    document.getElementById("userRegistrationModal").style.display = "flex";
    return;
  }

  alert("PDF Download (Simulated)");
}

// 🔥 Save user
async function saveUserAndDownload() {
  const n = regName.value.trim();
  const d = regDesignation.value.trim();
  const e = regEmail.value.trim();
  const m = regMobile.value.trim();

  if (!n || !d || !e || !m) {
    alert("Fill all fields");
    return;
  }

  await client.from("users").insert([
    { name: n, designation: d, email: e, mobile: m }
  ]);

  localStorage.setItem("estimate_app_user", JSON.stringify({ name: n, mobile: m }));

  document.getElementById("userRegistrationModal").style.display = "none";

  alert("Saved + Download Done ✅");
}
</script>

</body>
</html>
