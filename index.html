<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Estimate App</title>

<!-- CDN (IMPORTANT) -->
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body>

<h2 style="text-align:center;">ESTIMATE APP RUNNING ✅</h2>

<button onclick="handleDraftShare()">DOWNLOAD REPORT</button>

<!-- FORM -->
<div id="userRegistrationModal" style="display:none; position:fixed; inset:0; background:#0008; align-items:center; justify-content:center;">
  <div style="background:white; padding:20px;">
    <input id="regName" placeholder="Name"><br><br>
    <input id="regDesignation" placeholder="Designation"><br><br>
    <input id="regEmail" placeholder="Email"><br><br>
    <input id="regMobile" placeholder="Mobile"><br><br>
    <button onclick="saveUserAndDownload()">Submit</button>
  </div>
</div>

<script>
// ✅ SAFE SUPABASE
const supabaseUrl = "https://pnmvkexztowmcakmgxtj.supabase.co";
const supabaseKey = "sb_publishable_5WKF82sJGvKiuT3SaKZCGw_JbXzhXo6";

let client = null;
if (window.supabase) {
  client = window.supabase.createClient(supabaseUrl, supabaseKey);
}

// ✅ FORM HIDE FIX
window.onload = function () {
  document.getElementById('userRegistrationModal').style.display = 'none';
};

// ✅ DOWNLOAD LOGIC
function handleDraftShare() {
  const savedUser = localStorage.getItem('estimate_app_user');

  if (!savedUser) {
    document.getElementById('userRegistrationModal').style.display = 'flex';
    return;
  }

  alert("PDF Download Trigger");
}

// ✅ SAVE USER
async function saveUserAndDownload() {
  const n = regName.value.trim();
  const d = regDesignation.value.trim();
  const e = regEmail.value.trim();
  const m = regMobile.value.trim();

  if (!n || !d || !e || !m) {
    alert("Fill all fields");
    return;
  }

  if (client) {
    await client.from("users").insert([
      { name: n, designation: d, email: e, mobile: m }
    ]);
  }

  localStorage.setItem("estimate_app_user", JSON.stringify({ name: n, mobile: m }));

  document.getElementById('userRegistrationModal').style.display = 'none';

  alert("Saved + Download Done ✅");
}
</script>

</body>
</html>
