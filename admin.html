<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>

  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #f5f6fa;
    }

    h2 {
      color: #2c3e50;
    }

    button {
      padding: 10px 15px;
      background: #27ae60;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 5px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
    }

    th {
      background: #2c3e50;
      color: white;
      padding: 10px;
    }

    td {
      padding: 8px;
      border: 1px solid #ddd;
      text-align: center;
    }

    tr:nth-child(even) {
      background: #f2f2f2;
    }
  </style>
</head>

<body>

<h2>All Users Data</h2>

<button onclick="downloadExcel()">Download Excel</button>

<br><br>

<table id="dataTable">
  <thead>
    <tr>
      <th>Name</th>
      <th>Designation</th>
      <th>Email</th>
      <th>Mobile</th>
      <th>Date</th>
      <th>Time</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- Excel -->
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<script>
const supabaseUrl = "https://pnmvkexztowmcakmgxtj.supabase.co";
const supabaseKey = "sb_publishable_5WKF82sJGvKiuT3SaKZCGw_JbXzhXo6";

const client = supabase.createClient(supabaseUrl, supabaseKey);

let allData = [];

// ✅ LOAD DATA (latest first)
async function loadData() {
  const { data, error } = await client
    .from("users")
    .select("*")
    .order("created_at", { ascending: false });

  if (error) {
    console.log(error);
    alert("Error loading data");
    return;
  }

  allData = data;

  const table = document.querySelector("#dataTable tbody");
  table.innerHTML = "";

  data.forEach(user => {

    const name = user.name || "-";
    const designation = user.designation || "-";
    const email = user.email || "-";
    const mobile = user.mobile || "-";

    let date = "";
    let time = "";

    if (user.created_at) {
      const d = new Date(user.created_at);
      date = d.toLocaleDateString();
      time = d.toLocaleTimeString();
    }

    const row = `
      <tr>
        <td>${name}</td>
        <td>${designation}</td>
        <td>${email}</td>
        <td>${mobile}</td>
        <td>${date}</td>
        <td>${time}</td>
      </tr>
    `;

    table.innerHTML += row;
  });
}

// ✅ Excel Download
function downloadExcel() {

  if (allData.length === 0) {
    alert("No data available");
    return;
  }

  const formatted = allData.map(user => {
    let date = "";
    let time = "";

    if (user.created_at) {
      const d = new Date(user.created_at);
      date = d.toLocaleDateString();
      time = d.toLocaleTimeString();
    }

    return {
      Name: user.name || "-",
      Designation: user.designation || "-",
      Email: user.email || "-",
      Mobile: user.mobile || "-",
      Date: date,
      Time: time
    };
  });

  const worksheet = XLSX.utils.json_to_sheet(formatted);
  const workbook = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(workbook, worksheet, "Users");

  XLSX.writeFile(workbook, "users_data.xlsx");
}

// ✅ AUTO REFRESH (हर 5 सेकंड)
setInterval(loadData, 5000);

// पहली बार load
loadData();
</script>

</body>
</html>
