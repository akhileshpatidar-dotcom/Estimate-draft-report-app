<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>

  <style>
    body { font-family: Arial; padding: 20px; background: #f5f6fa; }
    h2 { color: #2c3e50; }

    button {
      padding: 8px 12px;
      background: #27ae60;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 5px;
      margin: 2px;
    }

    .delete-btn {
      background: #e74c3c;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
    }

    th {
      background: #2c3e50;
      color: white;
      padding: 10px;
    }

    td {
      padding: 8px;
      border: 1px solid #ddd;
      text-align: center;
    }

    tr:nth-child(even) {
      background: #f2f2f2;
    }
  </style>
</head>

<body>

<h2>All Users Data</h2>

<button onclick="downloadExcel()">Download Excel</button>

<br><br>

<table id="dataTable">
  <thead>
    <tr>
      <th>Name</th>
      <th>Designation</th>
      <th>Email</th>
      <th>Mobile</th>
      <th>Date</th>
      <th>Time</th>
      <th>Action</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<script>
const supabaseUrl = "https://pnmvkexztowmcakmgxtj.supabase.co";
const supabaseKey = "sb_publishable_5WKF82sJGvKiuT3SaKZCGw_JbXzhXo6";

const client = supabase.createClient(supabaseUrl, supabaseKey);

let allData = [];

async function loadData() {
  const { data, error } = await client
    .from("users")
    .select("*")
    .order("created_at", { ascending: false });

  if (error) {
    console.log(error);
    alert("Error loading data");
    return;
  }

  allData = data;
  renderTable();
}

function renderTable() {
  const table = document.querySelector("#dataTable tbody");
  table.innerHTML = "";

  allData.forEach(user => {

    let date = "", time = "";
    if (user.created_at) {
      const d = new Date(user.created_at);
      date = d.toLocaleDateString();
      time = d.toLocaleTimeString();
    }

    const row = `
      <tr>
        <td>${user.name || "-"}</td>
        <td>${user.designation || "-"}</td>
        <td>${user.email || "-"}</td>
        <td>${user.mobile || "-"}</td>
        <td>${date}</td>
        <td>${time}</td>
        <td>
          <button class="delete-btn" onclick="deleteUser('${user.id}')">Delete</button>
        </td>
      </tr>
    `;

    table.innerHTML += row;
  });
}

// ✅ DELETE FUNCTION
async function deleteUser(id) {
  if (!confirm("Delete this user?")) return;

  const { error } = await client
    .from("users")
    .delete()
    .eq("id", id);

  if (error) {
    console.log(error);
    alert("Delete failed");
  } else {
    loadData();
  }
}

// ✅ Excel Download
function downloadExcel() {
  const formatted = allData.map(user => {
    let date = "", time = "";

    if (user.created_at) {
      const d = new Date(user.created_at);
      date = d.toLocaleDateString();
      time = d.toLocaleTimeString();
    }

    return {
      Name: user.name || "-",
      Designation: user.designation || "-",
      Email: user.email || "-",
      Mobile: user.mobile || "-",
      Date: date,
      Time: time
    };
  });

  const worksheet = XLSX.utils.json_to_sheet(formatted);
  const workbook = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(workbook, worksheet, "Users");

  XLSX.writeFile(workbook, "users_data.xlsx");
}

// refresh
setInterval(loadData, 5000);
loadData();
</script>

</body>
</html>
